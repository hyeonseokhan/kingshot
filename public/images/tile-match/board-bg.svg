<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="tmBoardBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9efd5"/>
      <stop offset="100%" stop-color="#ecdcb5"/>
    </linearGradient>
    <radialGradient id="tmBoardVignette" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.07"/>
    </radialGradient>
    <!-- Faint noise texture (parchment grain) — small repeating pattern -->
    <pattern id="tmBoardGrain" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="8" r="0.5" fill="#9c7a3e" opacity="0.08"/>
      <circle cx="22" cy="15" r="0.4" fill="#9c7a3e" opacity="0.06"/>
      <circle cx="35" cy="28" r="0.5" fill="#9c7a3e" opacity="0.08"/>
      <circle cx="12" cy="33" r="0.3" fill="#9c7a3e" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Base parchment fill -->
  <rect width="1920" height="1080" fill="url(#tmBoardBase)"/>

  <!-- Subtle parchment grain overlay -->
  <rect width="1920" height="1080" fill="url(#tmBoardGrain)"/>

  <!-- Outer gold border frame (decorative) -->
  <rect x="20" y="20" width="1880" height="1040" rx="16" ry="16"
        fill="none" stroke="#9c7a3e" stroke-width="3" opacity="0.55"/>
  <rect x="32" y="32" width="1856" height="1016" rx="12" ry="12"
        fill="none" stroke="#c9a961" stroke-width="1" opacity="0.6"/>

  <!-- Decorative corner flourishes (simple ornamental dots) -->
  <g fill="#9c7a3e" opacity="0.5">
    <!-- top-left -->
    <circle cx="80" cy="80" r="4"/>
    <circle cx="105" cy="60" r="3"/>
    <circle cx="60" cy="105" r="3"/>
    <!-- top-right -->
    <circle cx="1840" cy="80" r="4"/>
    <circle cx="1815" cy="60" r="3"/>
    <circle cx="1860" cy="105" r="3"/>
    <!-- bottom-left -->
    <circle cx="80" cy="1000" r="4"/>
    <circle cx="105" cy="1020" r="3"/>
    <circle cx="60" cy="975" r="3"/>
    <!-- bottom-right -->
    <circle cx="1840" cy="1000" r="4"/>
    <circle cx="1815" cy="1020" r="3"/>
    <circle cx="1860" cy="975" r="3"/>
  </g>

  <!-- Vignette overlay (slight edge darkening for tile readability) -->
  <rect width="1920" height="1080" fill="url(#tmBoardVignette)"/>
</svg>
