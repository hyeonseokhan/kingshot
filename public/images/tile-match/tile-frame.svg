<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 270" preserveAspectRatio="none">
  <defs>
    <linearGradient id="tmTileBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf2d8"/>
      <stop offset="55%" stop-color="#f5e8c8"/>
      <stop offset="100%" stop-color="#dec792"/>
    </linearGradient>
    <linearGradient id="tmTilePanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede0b0"/>
      <stop offset="100%" stop-color="#e0cf90"/>
    </linearGradient>
    <filter id="tmTileShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Tile body (cream gradient + gold border + drop shadow) -->
  <rect x="6" y="6" width="208" height="248" rx="22" ry="22"
        fill="url(#tmTileBody)" stroke="#9c7a3e" stroke-width="3"
        filter="url(#tmTileShadow)"/>

  <!-- Inner recessed panel (icon area) -->
  <rect x="22" y="22" width="176" height="200" rx="14" ry="14"
        fill="url(#tmTilePanel)" stroke="#b8915a" stroke-width="1.5"/>

  <!-- Bottom darker band — 3D depth illusion -->
  <rect x="6" y="218" width="208" height="36" rx="22" ry="22"
        fill="#b8945f" opacity="0.32"/>
  <!-- Bottom band cover (clip top half so only bottom rounded portion shows darker) -->
  <rect x="6" y="218" width="208" height="20" fill="#dec792"/>

  <!-- Top highlight — light catches top edge -->
  <rect x="16" y="11" width="188" height="3" rx="1.5" ry="1.5"
        fill="#fff" opacity="0.55"/>
</svg>
